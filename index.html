<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tautan Saya</title>
    <style>
        /* Variabel CSS untuk memudahkan ubah tema/warna */
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --btn-bg: #ffffff;
            --btn-text: #0f172a;
            --btn-hover: #f1f5f9;
            --primary-color: #6366f1;
        }

        /* Reset margin & padding */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 3rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* Gaya Foto Profil */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 4px solid var(--primary-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .bio {
            font-size: 1rem;
            color: #64748b;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        /* Gaya Kumpulan Tautan */
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: block;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            text-decoration: none;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.05rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            background-color: var(--btn-hover);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border-color: #cbd5e1;
        }

        /* Gaya Tombol Share */
        .share-btn {
            margin-top: 2.5rem;
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: background 0.3s ease;
        }

        .share-btn:hover {
            background-color: #e0e7ff;
        }

        /* Notifikasi (Toast) */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #334155;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="Foto Profil" class="profile-pic">
        <h1 class="name">Nama Anda</h1>
        <p class="bio">Web Developer & Content Creator. Selamat datang di halaman tautan saya!</p>

        <div class="links">
            <a href="https://instagram.com" target="_blank" class="link-btn">📷 Instagram</a>
            <a href="https://twitter.com" target="_blank" class="link-btn">🐦 X / Twitter</a>
            <a href="https://youtube.com" target="_blank" class="link-btn">🎥 YouTube Channel</a>
            <a href="https://github.com" target="_blank" class="link-btn">💻 GitHub</a>
            <a href="mailto:emailanda@gmail.com" class="link-btn">✉️ Hubungi via Email</a>
        </div>

        <button class="share-btn" onclick="shareProfile()">
            🔗 Bagikan Halaman Ini
        </button>
    </div>

    <div id="toast">Tautan berhasil disalin ke clipboard!</div>

    <script>
        function shareProfile() {
            const urlToShare = window.location.href;

            // Cek apakah browser mendukung fitur Native Share (biasanya di perangkat mobile)
            if (navigator.share) {
                navigator.share({
                    title: 'Profil Tautan Saya',
                    text: 'Lihat semua tautan penting saya di sini!',
                    url: urlToShare,
                })
                .then(() => console.log('Berhasil dibagikan'))
                .catch((error) => console.log('Gagal membagikan:', error));
            } else {
                // Jika tidak didukung (contohnya di PC), salin tautan ke clipboard
                navigator.clipboard.writeText(urlToShare).then(function() {
                    showToast();
                }).catch(function(err) {
                    console.error('Gagal menyalin teks:', err);
                });
            }
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "show";
            // Hilangkan notifikasi setelah 3 detik
            setTimeout(function(){ 
                toast.className = toast.className.replace("show", ""); 
            }, 3000);
        }
    </script>
</body>
</html>
